
name: Build Android APK (Professional Cloud Build)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Generate Production APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js Web App (Static Export)
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Scaffold & Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: 🔑 Extract SHA-256 Fingerprint
        run: |
          cd android
          chmod +x gradlew
          ./gradlew signingReport > report.txt
          echo "------------------------------------------------------------"
          echo "🚀 YOUR SHA-256 FINGERPRINT IS BELOW:"
          grep -A 3 "Variant: debug" report.txt | grep "SHA-256" || true
          echo "------------------------------------------------------------"
          echo "Bhaai, is code ko copy karke Firebase Console mein daalein!"

      - name: Build APK (Debug/Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoMasterAI-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
