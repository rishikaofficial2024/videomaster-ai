
name: Build Android APK (Professional Cloud Build)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Generate Production APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@39325e39a66ef45a008715818d4ed589533b28b1 # v4.1.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js Web App (Static Export)
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@8df10395026bd1b946df8f79573998f0399fe51d # v4.5.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@739502010168ba89f07455e3782b1ed009949683 # v3.2.1

      - name: Capacitor Scaffold & Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: 🔑 Extract SHA-256 Fingerprint
        run: |
          cd android
          chmod +x gradlew
          ./gradlew signingReport > report.txt
          echo "------------------------------------------------------------"
          echo "🚀 YOUR SHA-256 FINGERPRINT FOR FIREBASE:"
          grep -A 3 "Variant: debug" report.txt | grep "SHA-256" || true
          echo "------------------------------------------------------------"

      - name: Build APK (Debug/Release)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea23f8d31acc301f953c0628e # v4.4.3
        with:
          name: VideoMasterAI-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
